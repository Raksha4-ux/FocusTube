<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FocusTube</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        padding: 16px;
        width: 300px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #0f172a;
        color: #e5e7eb;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .subtitle {
        margin: 0 0 8px;
        font-size: 12px;
        color: #9ca3af;
      }

      .card {
        padding: 10px 12px;
        border-radius: 10px;
        background: #020617;
        border: 1px solid #1f2937;
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 600;
        color: #facc15;
      }

      .section-title .icon {
        display: flex;
        align-items: center;
      }

      .section-title .icon svg {
        width: 14px;
        height: 14px;
      }

      .btn-icon {
        display: inline-flex;
        align-items: center;
        margin-right: 6px;
      }

      .btn-icon svg {
        width: 14px;
        height: 14px;
      }

      .category-icon {
        display: inline-flex;
        align-items: center;
        margin-right: 6px;
      }

      .category-icon svg {
        width: 12px;
        height: 12px;
        color: #9ca3af;
      }

      #year-progress {
        font-size: 13px;
        line-height: 1.4;
        color: #e5e7eb;
      }

      .analytics-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 3px;
      }

      .analytics-category {
        display: flex;
        align-items: center;
        color: #9ca3af;
      }

      .analytics-time {
        color: #f9fafb;
        font-weight: 500;
      }

      .analytics-empty {
        font-size: 12px;
        color: #6b7280;
      }

      button {
        margin-top: 4px;
        width: 100%;
        padding: 8px 10px;
        border-radius: 999px;
        border: none;
        background: #2563eb;
        color: #f9fafb;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.05s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button:hover {
        background: #1d4ed8;
      }

      button:active {
        transform: translateY(1px);
      }

      .footer-note {
        margin-top: 4px;
        font-size: 10px;
        color: #6b7280;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>FocusTube</h1>
        <p class="subtitle">Stay on track. Skip the Shorts.</p>
      </header>

      <section class="card">
        <div class="section-title">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </span>
          <span>Focus Reminder</span>
        </div>
        <div id="year-progress">
          <!-- Filled by popup.js -->
        </div>
      </section>

      <section class="card">
        <div class="section-title">
          <span class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          </span>
          <span>Last 30 Days</span>
        </div>
        <div id="analytics-list">
          <div class="analytics-empty">
            No analytics yet. Watch some focused content and come back.
          </div>
        </div>
      </section>

      <button id="open-youtube">
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </span>
        Open YouTube Homepage
      </button>

      <button id="open-analytics">
        <span class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        </span>
        Open Analytics Dashboard
      </button>

      <div class="footer-note">
        Every blocked Short is a step away from distraction.
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
